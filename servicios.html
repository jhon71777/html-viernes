<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge - Ajustes</title>
    <link rel="stylesheet" href="servicios.css">
</head>

<body>


    <div class="ajustes">
        <h1>EV Charge - Ajustes</h1>
    </div>


    <div class="contenedor">


        <div class="menu">


            <div class="opcion active">
                <p>Editar perfil</p>
            </div>


            <div class="linea"></div>


            <div class="opcion">
                <p>Datos personales</p>
            </div>


            <div class="linea"></div>


            <div class="opcion">
                <p>Vehículo registrado</p>
            </div>


            <div class="linea"></div>


            <div class="opcion">
                <p>Cargadores favoritos</p>
            </div>


            <div class="linea"></div>


            <div class="opcion">
                <p>Notificaciones</p>
            </div>


            <div class="linea"></div>


            <div class="opcion">
                <p>Seguridad</p>
            </div>


            <div class="linea"></div>


            <div class="opcion cerrar">
                <p onclick="window.location.href='inicio.html'">volver a inicio</p>
            </div>


        </div>


        <div class="panel">


            <h2>Editar Perfil</h2>


            <div class="perfil">


                <div class="foto">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="perfil">
                </div>


                <div class="datos">


                    <label>Nombre completo</label>
                    <input type="text" placeholder="ejemplo usuario">


                    <label>Correo electrónico</label>
                    <input type="email" placeholder="usuario@evcharge.com">


                    <label>Teléfono</label>
                    <input type="text" placeholder="+57 300 000 0000">


                </div>


            </div>


            <h2>Vehículo Registrado</h2>


            <div class="vehiculo">


                <label>Marca del vehículo</label>
                <input type="text" placeholder="Tesla">


                <label>Modelo</label>
                <input type="text" placeholder="Model 3">


                <label>Placa</label>
                <input type="text" placeholder="ABC123">


                <label>Tipo de conector</label>
                <select>
                    <option>CCS Combo</option>
                    <option>Tipo 1</option>
                    <option>Tipo 2</option>
                    <option>CHAdeMO</option>
                </select>


            </div>


            <button>Guardar cambios</button>


        </div>


    </div>


</body>

</html>
