<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="encabezado">
        <h1>EV Charge Dashboard</h1>
    </div>

    <div class="contenedor">

        <div class="menu">

            <div class="opcion activa">
                <p>Inicio</p>
            </div>

            <div class="linea"></div>

            <div class="opcion">
                <p>Estaciones</p>
            </div>

            <div class="linea"></div>

            <div class="opcion">
                <p>Vehículos</p>
            </div>

            <div class="linea"></div>

            <div class="opcion">
                <p>Reportes</p>
            </div>

            <div class="linea"></div>

            <div class="opcion salir">
                <p>Cerrar sesión</p>
            </div>

        </div>

        <div class="panel">

            <div class="caja">
                <h2>Usuarios</h2>
                <p>20 usuarios registrados</p>
            </div>

            <div class="caja">
                <h2>Vehículos</h2>
                <p>5 vehículos conectados</p>
            </div>

            <div class="caja">
                <h2>Cargadores</h2>
                <p>12 cargadores activos</p>
            </div>

            <div class="caja">
                <h2>Reportes</h2>
                <p>8 reportes disponibles</p>
            </div>

        </div>

    </div>

</body>
</html>
