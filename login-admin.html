<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E.V CHARGE — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="auth-page" style="display:flex;min-height:100vh;">
  <div class="auth-box">
    <h1 class="titulo"  style="color:var(--red);">Panel Admin</h1>
    <p class="sub" >Acceso restringido — E.V CHARGE</p>
    <div class="field"><label>Usuario</label><input type="text" id="a-user" placeholder="admin"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="a-pass" placeholder="••••••••"></div>
    <button class="auth-btn" style="background:var(--red);" onclick="loginAdmin()">Acceder</button>
    <a class="back-link" href="index.html">← Volver al inicio</a>
  </div>
</div>

<script>
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function loginAdmin() {
  const u = document.getElementById('a-user').value.trim();
  const p = document.getElementById('a-pass').value.trim();
  if (u === 'admin' && p === 'admin') {
    toast('Acceso concedido');
    setTimeout(() => location.href = 'panel.html', 1000);
  } else {
    toast('Credenciales incorrectas');
  }
}
</script>
</body>
</html>
